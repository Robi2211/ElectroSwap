{% extends "layout.html" %}
{% block title %}Login – Electro Swap{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card bg-dark border-secondary">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-lightning-charge-fill text-warning"></i> Login</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" name="email" id="email" class="form-control bg-dark text-light" placeholder="you@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" id="password" class="form-control bg-dark text-light" placeholder="••••••••" required>
                    </div>
                    <button class="btn btn-warning w-100" type="submit"><i class="bi bi-box-arrow-in-right"></i> Sign In</button>
                </form>
                <p class="text-center mt-3 mb-0 text-secondary">
                    Don't have an account? <a href="{{ url_for('register') }}" class="text-warning">Register</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
