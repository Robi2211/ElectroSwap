{% extends "layout.html" %}
{% block title %}Register – Electro Swap{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card bg-dark border-secondary">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-person-plus text-warning"></i> Create Account</h3>
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" name="username" id="username" class="form-control bg-dark text-light" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" name="email" id="email" class="form-control bg-dark text-light" required>
                        </div>
                        <div class="col-12">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" name="password" id="password" class="form-control bg-dark text-light" required>
                        </div>
                        <div class="col-md-6">
                            <label for="street" class="form-label">Street</label>
                            <input type="text" name="street" id="street" class="form-control bg-dark text-light">
                        </div>
                        <div class="col-md-4">
                            <label for="city" class="form-label">City</label>
                            <input type="text" name="city" id="city" class="form-control bg-dark text-light">
                        </div>
                        <div class="col-md-2">
                            <label for="zip" class="form-label">ZIP</label>
                            <input type="text" name="zip" id="zip" class="form-control bg-dark text-light">
                        </div>
                    </div>
                    <button class="btn btn-warning w-100 mt-4" type="submit"><i class="bi bi-person-plus"></i> Register</button>
                </form>
                <p class="text-center mt-3 mb-0 text-secondary">
                    Already have an account? <a href="{{ url_for('login') }}" class="text-warning">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
