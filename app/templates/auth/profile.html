{% extends "base.html" %}
{% block title %}Profile{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <h1 class="text-2xl font-bold text-white mb-8">My Profile</h1>

    <div class="glass rounded-2xl p-6 mb-8">
        <div class="flex items-center gap-4 mb-6">
            <div class="w-16 h-16 rounded-full bg-gradient-to-br from-brand-yellow to-brand-blue flex items-center justify-center text-brand-dark text-xl font-bold">{{ user.username[0]|upper }}</div>
            <div>
                <div class="text-lg font-semibold text-white">{{ user.username }}</div>
                <div class="text-sm text-gray-400">{{ user.email }}</div>
                <div class="text-xs text-brand-blue mt-1">{{ user.role|capitalize }}</div>
            </div>
        </div>
    </div>

    <div class="glass rounded-2xl p-6">
        <h2 class="text-lg font-semibold text-white mb-4">Shipping Address</h2>
        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-xs font-medium text-gray-400 mb-1.5">Street</label>
                    <input type="text" name="street" value="{{ user.address.street|default('') }}"
                           class="w-full px-4 py-3 bg-brand-dark border border-brand-border rounded-lg text-white text-sm focus:border-brand-yellow focus:outline-none focus:ring-1 focus:ring-brand-yellow/50 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1.5">City</label>
                    <input type="text" name="city" value="{{ user.address.city|default('') }}"
                           class="w-full px-4 py-3 bg-brand-dark border border-brand-border rounded-lg text-white text-sm focus:border-brand-yellow focus:outline-none focus:ring-1 focus:ring-brand-yellow/50 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1.5">ZIP Code</label>
                    <input type="text" name="zip_code" value="{{ user.address.zip_code|default('') }}"
                           class="w-full px-4 py-3 bg-brand-dark border border-brand-border rounded-lg text-white text-sm focus:border-brand-yellow focus:outline-none focus:ring-1 focus:ring-brand-yellow/50 transition-colors">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-medium text-gray-400 mb-1.5">Country</label>
                    <input type="text" name="country" value="{{ user.address.country|default('') }}"
                           class="w-full px-4 py-3 bg-brand-dark border border-brand-border rounded-lg text-white text-sm focus:border-brand-yellow focus:outline-none focus:ring-1 focus:ring-brand-yellow/50 transition-colors">
                </div>
            </div>
            <button type="submit" class="px-6 py-3 bg-brand-yellow text-brand-dark font-bold rounded-lg hover:bg-yellow-300 transition-colors text-sm">Save Address</button>
        </form>
    </div>
</div>
{% endblock %}
