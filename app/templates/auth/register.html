{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <div class="glass rounded-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white mb-2">Create Account</h1>
            <p class="text-sm text-gray-400">Join ElectroSwap today</p>
        </div>

        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Username</label>
                <input type="text" name="username" value="{{ username|default('') }}" required minlength="3"
                       class="w-full px-4 py-3 bg-brand-dark border border-brand-border rounded-lg text-white text-sm focus:border-brand-yellow focus:outline-none focus:ring-1 focus:ring-brand-yellow/50 transition-colors" placeholder="johndoe">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Email</label>
                <input type="email" name="email" value="{{ email|default('') }}" required
                       class="w-full px-4 py-3 bg-brand-dark border border-brand-border rounded-lg text-white text-sm focus:border-brand-yellow focus:outline-none focus:ring-1 focus:ring-brand-yellow/50 transition-colors" placeholder="you@example.com">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Password</label>
                <input type="password" name="password" required minlength="6"
                       class="w-full px-4 py-3 bg-brand-dark border border-brand-border rounded-lg text-white text-sm focus:border-brand-yellow focus:outline-none focus:ring-1 focus:ring-brand-yellow/50 transition-colors" placeholder="Min 6 characters">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Confirm Password</label>
                <input type="password" name="confirm_password" required
                       class="w-full px-4 py-3 bg-brand-dark border border-brand-border rounded-lg text-white text-sm focus:border-brand-yellow focus:outline-none focus:ring-1 focus:ring-brand-yellow/50 transition-colors" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full py-3 bg-brand-yellow text-brand-dark font-bold rounded-lg hover:bg-yellow-300 transition-colors glow-yellow text-sm">Create Account</button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account? <a href="{{ url_for('auth.login') }}" class="text-brand-blue hover:text-brand-yellow transition-colors font-medium">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
