{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <div class="glass rounded-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white mb-2">Welcome Back</h1>
            <p class="text-sm text-gray-400">Sign in to your ElectroSwap account</p>
        </div>

        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Email</label>
                <input type="email" name="email" value="{{ email|default('') }}" required
                       class="w-full px-4 py-3 bg-brand-dark border border-brand-border rounded-lg text-white text-sm focus:border-brand-yellow focus:outline-none focus:ring-1 focus:ring-brand-yellow/50 transition-colors" placeholder="you@example.com">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 bg-brand-dark border border-brand-border rounded-lg text-white text-sm focus:border-brand-yellow focus:outline-none focus:ring-1 focus:ring-brand-yellow/50 transition-colors" placeholder="••••••••">
            </div>
            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 text-sm text-gray-400">
                    <input type="checkbox" name="remember" class="rounded border-brand-border bg-brand-dark text-brand-yellow focus:ring-brand-yellow">
                    Remember me
                </label>
            </div>
            <button type="submit" class="w-full py-3 bg-brand-yellow text-brand-dark font-bold rounded-lg hover:bg-yellow-300 transition-colors glow-yellow text-sm">Sign In</button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-brand-blue hover:text-brand-yellow transition-colors font-medium">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
