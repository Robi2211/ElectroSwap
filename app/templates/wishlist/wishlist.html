{% extends 'base.html' %}
{% block title %}Wishlist – ElectroSwap{% endblock %}
{% block content %}
<h1 class="mb-4">Your Wishlist</h1>
{% if wishlist %}
<ul class="list-group">
    {% for item_id in wishlist %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        Product ID: {{ item_id }}
        <form action="{{ url_for('wishlist.remove_from_wishlist', product_id=item_id) }}" method="post" class="mb-0">
            <button type="submit" class="btn btn-sm btn-outline-danger">Remove</button>
        </form>
    </li>
    {% endfor %}
</ul>
{% else %}
<div class="alert alert-info">Your wishlist is empty. <a href="{{ url_for('products.list_products') }}">Browse products!</a></div>
{% endif %}
{% endblock %}
