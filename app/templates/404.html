{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-24 text-center">
    <div class="text-6xl mb-6"><i class="fa-solid fa-plug-circle-xmark text-gray-500"></i></div>
    <h1 class="text-4xl font-black text-brand-yellow mb-4">404</h1>
    <p class="text-gray-400 mb-8">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('main.index') }}" class="px-6 py-3 bg-brand-yellow text-brand-dark font-bold rounded-lg hover:bg-yellow-300 transition-colors text-sm">Back to Home</a>
</div>
{% endblock %}
