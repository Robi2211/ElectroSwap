{% extends 'base.html' %}

{% block title %}Add Product – ElectroSwap{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">

<h1 class="mb-4"><i class="bi bi-plus-circle text-warning"></i> Add New Product</h1>

<form action="{{ url_for('products.add_product') }}" method="post" novalidate>
    <div class="row g-3">

        <!-- Name -->
        <div class="col-12">
            <label for="name" class="form-label fw-bold">Product Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="name" name="name" required
                   value="{{ form_data.name if form_data else '' }}" placeholder="e.g. Apple MacBook Pro 14">
        </div>

        <!-- Description -->
        <div class="col-12">
            <label for="description" class="form-label fw-bold">Description <span class="text-danger">*</span></label>
            <textarea class="form-control" id="description" name="description" rows="3" required
                      placeholder="Describe the product in detail…">{{ form_data.description if form_data else '' }}</textarea>
        </div>

        <!-- Price & Weight -->
        <div class="col-md-6">
            <label for="price" class="form-label fw-bold">Price (€) <span class="text-danger">*</span></label>
            <input type="number" class="form-control" id="price" name="price" min="0" step="0.01" required
                   value="{{ form_data.price if form_data else '' }}" placeholder="0.00">
        </div>
        <div class="col-md-6">
            <label for="weight" class="form-label fw-bold">Weight (kg)</label>
            <input type="number" class="form-control" id="weight" name="weight" min="0" step="0.001"
                   value="{{ form_data.weight if form_data else '' }}" placeholder="0.000">
        </div>

        <!-- Category & Brand -->
        <div class="col-md-6">
            <label for="category" class="form-label fw-bold">Category <span class="text-danger">*</span></label>
            <select class="form-select" id="category" name="category" required>
                <option value="">-- Select category --</option>
                {% for cat in ['Laptops', 'Smartphones', 'Tablets', 'Audio', 'Accessories', 'Other'] %}
                <option value="{{ cat }}" {% if form_data and form_data.category == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label for="brand" class="form-label fw-bold">Brand <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="brand" name="brand" required
                   value="{{ form_data.brand if form_data else '' }}" placeholder="e.g. Apple">
        </div>

        <!-- SKU & Stock -->
        <div class="col-md-6">
            <label for="sku" class="form-label fw-bold">SKU <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="sku" name="sku" required
                   value="{{ form_data.sku if form_data else '' }}" placeholder="e.g. APPL-MBP14-512">
        </div>
        <div class="col-md-6">
            <label for="stock_quantity" class="form-label fw-bold">Stock Quantity <span class="text-danger">*</span></label>
            <input type="number" class="form-control" id="stock_quantity" name="stock_quantity" min="0" required
                   value="{{ form_data.stock_quantity if form_data else '' }}" placeholder="0">
        </div>

        <!-- Condition -->
        <div class="col-md-6">
            <label class="form-label fw-bold">Condition <span class="text-danger">*</span></label>
            <div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="condition" id="cond_new" value="new"
                           {% if not form_data or form_data.condition == 'new' %}checked{% endif %}>
                    <label class="form-check-label" for="cond_new">New</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="condition" id="cond_used" value="used"
                           {% if form_data and form_data.condition == 'used' %}checked{% endif %}>
                    <label class="form-check-label" for="cond_used">Used</label>
                </div>
            </div>
        </div>

        <!-- Image URL -->
        <div class="col-12">
            <label for="image_url" class="form-label fw-bold">Image URL</label>
            <input type="url" class="form-control" id="image_url" name="image_url"
                   value="{{ form_data.image_url if form_data else '' }}"
                   placeholder="https://example.com/product-image.jpg">
        </div>

        <div class="col-12 mt-2">
            <button type="submit" class="btn btn-warning btn-lg">
                <i class="bi bi-check-circle"></i> Save Product
            </button>
            <a href="{{ url_for('products.list_products') }}" class="btn btn-outline-secondary btn-lg ms-2">Cancel</a>
        </div>
    </div>
</form>

</div>
</div>
{% endblock %}
